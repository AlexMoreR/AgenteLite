version: "3.9"
### Version

services:
  magilus_app:
    image: ghcr.io/alexmorer/gestion:latest
    volumes:
      - magilus_uploads:/app/public/uploads
    environment:
      NODE_ENV: "production"
      AUTH_URL: "https://magilus.com"
      NEXT_PUBLIC_SITE_URL: "https://magilus.com"
      DATABASE_URL: "${DATABASE_URL}"
      AUTH_SECRET: "${AUTH_SECRET}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
    networks:
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.magilus.rule=Host(`magilus.com`) || Host(`www.magilus.com`)
        - traefik.http.routers.magilus.entrypoints=websecure
        - traefik.http.routers.magilus.tls=true
        - traefik.http.routers.magilus.tls.certresolver=letsencryptresolver
        - traefik.http.routers.magilus.service=magilus
        - traefik.http.services.magilus.loadbalancer.server.port=3000
        - traefik.http.services.magilus.loadbalancer.passHostHeader=true

networks:
  minha_rede:
    external: true

volumes:
  magilus_uploads:

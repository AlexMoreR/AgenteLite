services:
  aizenbot_app:
    image: ghcr.io/alexmorer/agentelite:latest
    volumes:
      - aizenbot_uploads:/app/public/uploads
    environment:
      NODE_ENV: "production"
      BACKEND_ENV: "https://app.aizenbot.com"
      AUTH_URL: "https://app.aizenbot.com"
      NEXTAUTH_URL: "https://app.aizenbot.com"
      NEXT_PUBLIC_SITE_URL: "https://app.aizenbot.com"
      DATABASE_URL: "${DATABASE_URL}"
      AUTH_SECRET: "${AUTH_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      FOLLOW_CRON_SECRET: "${FOLLOW_CRON_SECRET}"
      EVOLUTION_WEBHOOK_SECRET: "${EVOLUTION_WEBHOOK_SECRET}"
      PRISMA_AUTO_RESOLVE_FAILED_OFFICIAL_API_MIGRATION: "true"
    networks:
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.aizenbot.rule=Host(`app.aizenbot.com`)
        - traefik.http.routers.aizenbot.entrypoints=websecure
        - traefik.http.routers.aizenbot.tls=true
        - traefik.http.routers.aizenbot.tls.certresolver=letsencryptresolver
        - traefik.http.routers.aizenbot.service=aizenbot
        - traefik.http.services.aizenbot.loadbalancer.server.port=3000
        - traefik.http.services.aizenbot.loadbalancer.passHostHeader=true

  aizenbot_follow_cron:
    image: curlimages/curl:8.11.1
    environment:
      FOLLOW_CRON_SECRET: "${FOLLOW_CRON_SECRET}"
      EVOLUTION_WEBHOOK_SECRET: "${EVOLUTION_WEBHOOK_SECRET}"
    command:
      - sh
      - -lc
      - |
        while true; do
          SECRET="$$FOLLOW_CRON_SECRET"
          if [ -z "$SECRET" ]; then
            SECRET="$$EVOLUTION_WEBHOOK_SECRET"
          fi
          if [ -n "$SECRET" ]; then
            echo "[follow-cron] calling /api/cron/follows with secret"
            curl -sS -X POST \
              -H "x-follow-cron-secret: $SECRET" \
              -o /tmp/follow-cron.body \
              -w "[follow-cron] http_status=%{http_code}\n" \
              https://app.aizenbot.com/api/cron/follows || true
          else
            echo "[follow-cron] calling /api/cron/follows without secret"
            curl -sS -X POST \
              -o /tmp/follow-cron.body \
              -w "[follow-cron] http_status=%{http_code}\n" \
              https://app.aizenbot.com/api/cron/follows || true
          fi
          if [ -f /tmp/follow-cron.body ]; then
            echo "[follow-cron] body:"
            cat /tmp/follow-cron.body
            rm -f /tmp/follow-cron.body
          fi
          sleep 60
        done
    networks:
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

networks:
  minha_rede:
    external: true

volumes:
  aizenbot_uploads:

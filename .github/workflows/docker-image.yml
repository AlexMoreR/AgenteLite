name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            DEPLOYMENT_ID=${{ github.sha }}
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          tags: ghcr.io/alexmorer/agentelite:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy
        env:
          WEBHOOK: ${{ secrets.PORTAINER_AGENTELITE }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            echo "Avisando a Portainer para redesplegar AgenteLite..."
            curl -fsSL -X POST "$WEBHOOK"
          else
            echo "PORTAINER_AGENTELITE no configurado; se omite el redeploy automatico."
          fi
